name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web app
        run: EXPO_PUBLIC_USE_STATIC_GENERATION=1 npx expo export --platform web --output-dir dist && node scripts/fix-paths.js
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}

      - name: Verify dist folder exists
        run: ls -la dist/ || exit 1

      - name: Verify paths are fixed in index.html
        run: |
          if grep -q '\.\./\_expo/' dist/index.html; then
            echo "❌ ERROR: Found unfixed paths ../_expo/ in index.html"
            cat dist/index.html
            exit 1
          fi
          if grep -q '^[^.]*/_expo/' dist/index.html | grep -v './_expo/'; then
            echo "❌ ERROR: Found unfixed absolute paths /_expo/ in index.html"
            exit 1
          fi
          echo "✓ All paths in index.html are correctly fixed"
          grep -o '\./[a-zA-Z_]*' dist/index.html | head -5

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
