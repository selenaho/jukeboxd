name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Expo web app
        run: EXPO_PUBLIC_USE_STATIC_GENERATION=1 npx expo export --platform web --output-dir dist && node scripts/fix-paths.js
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}

      - name: Verify dist folder exists
        run: ls -la dist/ || exit 1

      - name: Verify paths are fixed
        run: |
          echo "Checking index.html..."
          if grep -q '\.\./\_expo/' dist/index.html; then
            echo "❌ ERROR: Found unfixed paths ../_expo/ in index.html"
            exit 1
          fi
          if grep -q "/favicon" dist/index.html | grep -v './favicon'; then
            echo "❌ ERROR: Found unfixed absolute favicon paths in index.html" 
            exit 1
          fi
          echo "✓ index.html paths are correct"
          
          echo "Checking JS bundles for malformed asset paths..."
          if find dist/_expo -name "*.js" -exec grep -l '"/assets/node_modules' {} \; 2>/dev/null; then
            echo "❌ ERROR: Found unfixed absolute /assets paths in JS bundles"
            exit 1
          fi
          
          # Verify relative asset paths are present
          if find dist/_expo -name "*.js" -exec grep -l '"./assets/' {} \; 2>/dev/null | head -1 | grep -q .; then
            echo "✓ JS bundles have correct relative asset paths"
          else
            echo "⚠️  WARNING: No relative ./assets/ paths found in JS bundles (might be normal if no assets are imported)"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
