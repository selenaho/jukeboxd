name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export static web build
        run: npm run predeploy
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}

      - name: Verify subpath-safe assets
        run: |
          if grep -R -F "../_expo/" dist; then
            echo "Found unresolved ../_expo/ paths";
            exit 1;
          fi
          if grep -R -F "\"/assets/" dist/_expo/static/js/web; then
            echo "Found unresolved absolute /assets/ paths in bundles";
            exit 1;
          fi

      - name: Ensure .nojekyll
        run: touch dist/.nojekyll

      - name: Copy root index.html for GitHub Pages
        run: cp dist/server/\(tabs\)/index.html dist/index.html

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npx gh-pages -d dist -b gh-pages -r "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
